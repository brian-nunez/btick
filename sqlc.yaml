version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "migrations/000001_init.sql"
      - "migrations/000002_users.sql"
      - "migrations/000003_tenant_isolation_backfill.sql"
    queries:
      - "queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
